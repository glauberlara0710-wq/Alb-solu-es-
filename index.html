    <!-- LOGICA DE ALTERNANCIA DAS ABAS -->
    <script>
        function mudarAba(abaDestino) {
            // Esconde todas as abas
            document.querySelectorAll('.aba').forEach(aba => {
                aba.classList.add('hidden');
                aba.classList.remove('ativa', 'flex');
            });

            // Reseta a cor de todos os botões da barra de navegação
            const botoes = document.querySelectorAll('div.sticky button');
            botoes.forEach(btn => {
                btn.classList.remove('bg-blue-600');
                btn.classList.add('bg-slate-700');
            });

            // Mostra a aba selecionada
            const abaAtiva = document.getElementById('aba-' + abaDestino);
            if (abaAtiva) {
                abaAtiva.classList.remove('hidden');
                abaAtiva.classList.add('ativa', 'flex');
            }

            // Ativa o destaque no botão correto usando o ID dele
            const botaoAtivo = document.getElementById('btn-' + abaDestino);
            if (botaoAtivo) {
                botaoAtivo.classList.remove('bg-slate-700');
                botaoAtivo.classList.add('bg-blue-600');
            }
        }
    </script>
